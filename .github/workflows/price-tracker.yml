name: Indian Price Tracker - Layer 4 Production

on:
  schedule:
    # Runs every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  track-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: 🔍 Run Price Tracker with Playwright
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          SHEETS_CREDENTIALS: ${{ secrets.SHEETS_CREDENTIALS }}
          SHEETS_ENABLED: ${{ secrets.SHEETS_ENABLED }}
        run: |
          python main.py
      
      - name: 💾 Commit Database and Monitoring Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add tracker.db web/monitoring/*.md
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 Update monitoring dashboard - $(date +'%Y-%m-%d %H:%M UTC')"
      
      - name: 🚀 Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
